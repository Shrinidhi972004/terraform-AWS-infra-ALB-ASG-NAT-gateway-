trigger: none
# Manual-only, same as before. Even more important with OIDC,
# since temporary credentials are still powerful for their lifetime.

variables:
  - name: TF_ROOT_DIR
    value: 'environments/dev'
  - name: AWS_ROLE_ARN
    value: 'arn:aws:iam::009882533113:role/azure-devops-terraform-oidc-role'
  - name: AWS_REGION
    value: 'ap-south-1'

stages:

- stage: Destroy
  displayName: 'Terraform Destroy (OIDC)'
  jobs:
    - deployment: DestroyJob
      environment: 'production'
      pool:
        vmImage: 'ubuntu-latest'
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
                displayName: 'Checkout repo'

              - script: |
                  curl -o terraform.zip https://releases.hashicorp.com/terraform/1.9.0/terraform_1.9.0_linux_amd64.zip
                  sudo apt-get install -y unzip
                  unzip terraform.zip
                  sudo mv terraform /usr/local/bin/
                displayName: 'Install Terraform'

              - task: DownloadSecureFile@1
                name: tfvarsFile
                inputs:
                  secureFile: 'terraform.tfvars'
                displayName: 'Download terraform.tfvars'

              - script: |
                  cp $(tfvarsFile.secureFilePath) $(System.DefaultWorkingDirectory)/$(TF_ROOT_DIR)/terraform.tfvars
                displayName: 'Place tfvars into working directory'

              - task: AzureCLI@2
                displayName: 'Fetch OIDC token and assume AWS role'
                inputs:
                  azureSubscription: '<your-workload-identity-service-connection-name>'
                  scriptType: 'bash'
                  scriptLocation: 'inlineScript'
                  inlineScript: |
                    # Get the OIDC ID token issued to this pipeline job
                    ID_TOKEN=$(curl -s -H "Authorization: Bearer $(System.AccessToken)" \
                      "$(System.CollectionUri)$(System.TeamProject)/_apis/distributedtask/hubs/build/plans/$(System.PlanId)/jobs/$(System.JobId)/oidctoken?api-version=7.1-preview.1&serviceConnectionId=<service-connection-id>" \
                      | jq -r '.oidcToken')

                    # Exchange it for temporary AWS credentials
                    CREDS=$(aws sts assume-role-with-web-identity \
                      --role-arn $(AWS_ROLE_ARN) \
                      --role-session-name "ado-destroy-$(Build.BuildId)" \
                      --web-identity-token "$ID_TOKEN" \
                      --duration-seconds 3600 \
                      --query 'Credentials' --output json)

                    echo "##vso[task.setvariable variable=AWS_ACCESS_KEY_ID;issecret=true]$(echo $CREDS | jq -r '.AccessKeyId')"
                    echo "##vso[task.setvariable variable=AWS_SECRET_ACCESS_KEY;issecret=true]$(echo $CREDS | jq -r '.SecretAccessKey')"
                    echo "##vso[task.setvariable variable=AWS_SESSION_TOKEN;issecret=true]$(echo $CREDS | jq -r '.SessionToken')"

              - script: |
                  cd $(TF_ROOT_DIR)
                  terraform init
                  terraform plan -destroy -out=destroyplan
                displayName: 'terraform plan -destroy'
                env:
                  AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
                  AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
                  AWS_SESSION_TOKEN: $(AWS_SESSION_TOKEN)
                  AWS_DEFAULT_REGION: $(AWS_REGION)

              - script: |
                  cd $(TF_ROOT_DIR)
                  terraform apply destroyplan
                displayName: 'terraform destroy (via apply of destroy plan)'
                env:
                  AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
                  AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
                  AWS_SESSION_TOKEN: $(AWS_SESSION_TOKEN)
                  AWS_DEFAULT_REGION: $(AWS_REGION)