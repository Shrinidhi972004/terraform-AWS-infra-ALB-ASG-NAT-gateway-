# =====================================================================
# Azure DevOps Pipeline: Terraform CI/CD for AWS Infrastructure
# Auth model: OIDC / Workload Identity Federation (no static AWS keys)
# =====================================================================
# Repo structure this pipeline assumes:
#   terraform-modules/
#   ├── environments/dev/   <- root module, has backend.tf + terraform.tfvars
#   │                          this is where init/validate/plan/apply run
#   └── modules/             <- reusable child modules (vpc, alb, asg, etc.)
#                                referenced by environments/dev/main.tf,
#                                Checkov scans this too, so scan runs from repo root
#
# Prerequisites for this pipeline to work:
#   1. AWS Toolkit for Azure DevOps extension installed on the org
#   2. Service connection created: "aws-oidc-sc" (Workload Identity federation)
#   3. AWS IAM OIDC provider + trust policy configured to trust that
#      service connection's issuer/subject claims
#   4. terraform.tfvars uploaded as a Secure File named 'terraform.tfvars'
# =====================================================================

trigger:
  branches:
    include:
      - main

variables:
  - name: TF_ROOT_DIR
    value: 'environments/dev'
  - name: AWS_DEFAULT_REGION
    value: 'ap-south-1'
  - name: AWS_SERVICE_CONNECTION
    value: 'aws-oidc-sc'
    # Matches the service connection you created in AZDO.

stages:

# =====================================================================
# STAGE 1: VALIDATE
# =====================================================================
- stage: Validate
  displayName: 'Terraform Validate'
  jobs:
    - job: ValidateJob
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - script: |
            curl -o terraform.zip https://releases.hashicorp.com/terraform/1.9.0/terraform_1.9.0_linux_amd64.zip
            sudo apt-get install -y unzip
            unzip terraform.zip
            sudo mv terraform /usr/local/bin/
            terraform version
          displayName: 'Install Terraform'

        - script: |
            cd $(TF_ROOT_DIR)
            terraform init -backend=false
            terraform validate
          displayName: 'terraform init & validate'

# =====================================================================
# STAGE 2: SECURITY SCAN (Checkov)
# =====================================================================
- stage: SecurityScan
  displayName: 'Checkov Security Scan'
  dependsOn: Validate
  jobs:
    - job: CheckovJob
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - script: |
            python3 -m pip install checkov --break-system-packages
          displayName: 'Install Checkov'

        - script: |
            checkov -d . --framework terraform --compact
          displayName: 'Run Checkov scan'

# =====================================================================
# STAGE 3: PLAN (OIDC-authenticated)
# =====================================================================
- stage: Plan
  displayName: 'Terraform Plan'
  dependsOn: SecurityScan
  jobs:
    - job: PlanJob
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - script: |
            curl -o terraform.zip https://releases.hashicorp.com/terraform/1.9.0/terraform_1.9.0_linux_amd64.zip
            sudo apt-get install -y unzip
            unzip terraform.zip
            sudo mv terraform /usr/local/bin/
          displayName: 'Install Terraform'

        - task: DownloadSecureFile@1
          name: tfvarsFile
          inputs:
            secureFile: 'terraform.tfvars'
          displayName: 'Download terraform.tfvars'

        - script: |
            cp $(tfvarsFile.secureFilePath) $(System.DefaultWorkingDirectory)/$(TF_ROOT_DIR)/terraform.tfvars
          displayName: 'Place tfvars into working directory'

        - task: AWSCLI@1
          displayName: 'Validate AWS OIDC Authentication'
          inputs:
            awsCredentials: '$(AWS_SERVICE_CONNECTION)'
            regionName: '$(AWS_DEFAULT_REGION)'
            awsCommand: 'sts'
            awsSubCommand: 'get-caller-identity'

        - task: AWSShellScript@1
          inputs:
            awsCredentials: '$(AWS_SERVICE_CONNECTION)'
            regionName: '$(AWS_DEFAULT_REGION)'
            scriptType: 'inline'
            inlineScript: |
              cd $(TF_ROOT_DIR)
              terraform init
              terraform plan -out=tfplan
          displayName: 'terraform init & plan (OIDC)'

        - publish: $(System.DefaultWorkingDirectory)/$(TF_ROOT_DIR)/tfplan
          artifact: tfplan

# =====================================================================
# STAGE 4: APPLY (manual approval required, OIDC-authenticated)
# =====================================================================
- stage: Apply
  displayName: 'Terraform Apply'
  dependsOn: Plan
  jobs:
    - deployment: ApplyJob
      environment: 'production'
      pool:
        vmImage: 'ubuntu-latest'
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
                displayName: 'Checkout repo'

              - script: |
                  curl -o terraform.zip https://releases.hashicorp.com/terraform/1.9.0/terraform_1.9.0_linux_amd64.zip
                  sudo apt-get install -y unzip
                  unzip terraform.zip
                  sudo mv terraform /usr/local/bin/
                displayName: 'Install Terraform'

              - task: DownloadSecureFile@1
                name: tfvarsFile
                inputs:
                  secureFile: 'terraform.tfvars'
                displayName: 'Download terraform.tfvars'

              - script: |
                  cp $(tfvarsFile.secureFilePath) $(System.DefaultWorkingDirectory)/$(TF_ROOT_DIR)/terraform.tfvars
                displayName: 'Place tfvars into working directory'

              - download: current
                artifact: tfplan
                displayName: 'Download plan artifact'

              - task: AWSCLI@1
                displayName: 'Validate AWS OIDC Authentication'
                inputs:
                  awsCredentials: '$(AWS_SERVICE_CONNECTION)'
                  regionName: '$(AWS_DEFAULT_REGION)'
                  awsCommand: 'sts'
                  awsSubCommand: 'get-caller-identity'

              - task: AWSShellScript@1
                inputs:
                  awsCredentials: '$(AWS_SERVICE_CONNECTION)'
                  regionName: '$(AWS_DEFAULT_REGION)'
                  scriptType: 'inline'
                  inlineScript: |
                    cd $(TF_ROOT_DIR)
                    terraform init
                    terraform apply -auto-approve $(Pipeline.Workspace)/tfplan/tfplan
                displayName: 'terraform apply (OIDC)'