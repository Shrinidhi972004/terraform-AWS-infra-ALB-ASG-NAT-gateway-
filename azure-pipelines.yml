# =====================================================================
# Azure DevOps Pipeline: Terraform CI/CD for AWS Infrastructure
# =====================================================================
# Repo structure this pipeline assumes:
#   terraform-modules/
#   ├── environments/dev/   <- root module, has backend.tf + terraform.tfvars
#   │                          this is where init/validate/plan/apply run
#   └── modules/             <- reusable child modules (vpc, alb, asg, etc.)
#                                referenced by environments/dev/main.tf,
#                                Checkov scans this too, so scan runs from repo root
# =====================================================================

trigger:
  branches:
    include:
      - main
  # Pipeline auto-triggers only on pushes to main.

variables:
  - group: aws-terraform-creds
    # AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION
  - name: TF_ROOT_DIR
    value: 'environments/dev'
    # Actual root module Terraform commands run from.

stages:

# =====================================================================
# STAGE 1: VALIDATE
# =====================================================================
- stage: Validate
  displayName: 'Terraform Validate'
  jobs:
    - job: ValidateJob
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - script: |
            curl -o terraform.zip https://releases.hashicorp.com/terraform/1.9.0/terraform_1.9.0_linux_amd64.zip
            sudo apt-get install -y unzip
            unzip terraform.zip
            sudo mv terraform /usr/local/bin/
            terraform version
          displayName: 'Install Terraform'

        - script: |
            cd $(TF_ROOT_DIR)
            terraform init -backend=false
            terraform validate
          displayName: 'terraform init & validate'
          # -backend=false: no AWS creds needed, no tfvars needed either
          # since validate only checks HCL syntax, not variable values.

# =====================================================================
# STAGE 2: SECURITY SCAN (Checkov)
# =====================================================================
- stage: SecurityScan
  displayName: 'Checkov Security Scan'
  dependsOn: Validate
  jobs:
    - job: CheckovJob
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - script: |
            python3 -m pip install checkov --break-system-packages
          displayName: 'Install Checkov'

        - script: |
            checkov -d . --framework terraform --compact
          displayName: 'Run Checkov scan'
          # No continue-on-error, no || true.
          # Non-zero exit here fails this stage and blocks Plan + Apply.

# =====================================================================
# STAGE 3: PLAN
# =====================================================================
- stage: Plan
  displayName: 'Terraform Plan'
  dependsOn: SecurityScan
  jobs:
    - job: PlanJob
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - script: |
            curl -o terraform.zip https://releases.hashicorp.com/terraform/1.9.0/terraform_1.9.0_linux_amd64.zip
            sudo apt-get install -y unzip
            unzip terraform.zip
            sudo mv terraform /usr/local/bin/
          displayName: 'Install Terraform'

        - task: DownloadSecureFile@1
          name: tfvarsFile
          inputs:
            secureFile: 'terraform.tfvars'
          displayName: 'Download terraform.tfvars'

        - script: |
            cp $(tfvarsFile.secureFilePath) $(System.DefaultWorkingDirectory)/$(TF_ROOT_DIR)/terraform.tfvars
          displayName: 'Place tfvars into working directory'
          # Terraform auto-loads terraform.tfvars if present in the
          # working directory, no -var-file flag needed.

        - script: |
            cd $(TF_ROOT_DIR)
            terraform init
            terraform plan -out=tfplan
          displayName: 'terraform init & plan'
          env:
            AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
            AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
            AWS_DEFAULT_REGION: $(AWS_DEFAULT_REGION)

        - publish: $(System.DefaultWorkingDirectory)/$(TF_ROOT_DIR)/tfplan
          artifact: tfplan

# =====================================================================
# STAGE 4: APPLY (manual approval required)
# =====================================================================
- stage: Apply
  displayName: 'Terraform Apply'
  dependsOn: Plan
  jobs:
    - deployment: ApplyJob
      environment: 'production'
      pool:
        vmImage: 'ubuntu-latest'
      strategy:
        runOnce:
          deploy:
            steps:
              - script: |
                  curl -o terraform.zip https://releases.hashicorp.com/terraform/1.9.0/terraform_1.9.0_linux_amd64.zip
                  sudo apt-get install -y unzip
                  unzip terraform.zip
                  sudo mv terraform /usr/local/bin/
                displayName: 'Install Terraform'

              - task: DownloadSecureFile@1
                name: tfvarsFile
                inputs:
                  secureFile: 'terraform.tfvars'
                displayName: 'Download terraform.tfvars'

              - script: |
                  cp $(tfvarsFile.secureFilePath) $(System.DefaultWorkingDirectory)/$(TF_ROOT_DIR)/terraform.tfvars
                displayName: 'Place tfvars into working directory'
                # Fresh agent for this stage too, nothing carried over
                # from the Plan stage's filesystem, so this must be
                # repeated here.

              - download: current
                artifact: tfplan
                displayName: 'Download plan artifact'

              - script: |
                  cd $(TF_ROOT_DIR)
                  terraform init
                  terraform apply -auto-approve $(Pipeline.Workspace)/tfplan/tfplan
                displayName: 'terraform apply'
                env:
                  AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
                  AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
                  AWS_DEFAULT_REGION: $(AWS_DEFAULT_REGION)
                # -auto-approve is safe here because the real human
                # approval already happened at the environment gate.